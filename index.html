<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Climate Risks Across U.S. National Parks</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <!-- Left control panel -->
        <aside class="sidebar">
            <div class="title-block">
                <h1>Climate Risk Explorer</h1>
                <p>U.S. National Parks</p>
            </div>

            <div class="panel-section">
                <label class="label">Search Park</label>
                <input id="searchBox" type="text" placeholder="e.g., Yellowstone">
            </div>

            <div class="panel-section">
                <label class="label">Hazard Layer</label>
                <select id="hazardSelect">
                    <option value="wildfire">Wildfire Risk</option>
                    <option value="drought">Drought Risk</option>
                    <option value="temperature">Temperature Risk</option>
                </select>
            </div>

            <div class="panel-section">
                <label class="label">Risk Level</label>
                <div class="legend-item"><span class="dot low"></span> Low</div>
                <div class="legend-item"><span class="dot medium"></span> Medium</div>
                <div class="legend-item"><span class="dot high"></span> High</div>
            </div>

            <div class="panel-section">
                <label class="label">Selected Park</label>
                <div id="detailPanel" class="detail-panel">
                    Click a park marker to view details.
                </div>
            </div>
        </aside>

        <!-- Main map area -->
        <main class="map-area">
            <div class="top-bar">
                <div>
                    <strong>Interactive National Park Climate Risk Map</strong>
                    <span>Leaflet + NPS API</span>
                </div>
            </div>

            <div id="map"></div>
        </main>

    </div>

    <!-- Libraries -->
    <script src="lib/jquery-3.5.1.js"></script>
    <script src="lib/d3.v7.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>

</body>
</html>
